modules:
  jira:globalPage:
    - key: capacity-waterline
      resource: main
      resolver:
        function: resolver
      title: Release Capacity Planning
      icon: resource:main;icons/icon.png
      pages:
        - title: Intake
          route: intake
        - title: Release Planning
          route: release-planning
        - title: Delivery Planning
          route: delivery-planning
  jira:dashboardGadget:
    - key: release-team-gadget
      title: RCP - Release Planning
      description: Story points planned vs team capacity for a release, with OK / Filling / Over status.
      thumbnail: https://developer.atlassian.com/platform/forge/images/icons/issue-panel-icon.svg
      resource: main
      resolver:
        function: resolver
      edit:
        resource: main
    - key: release-progress-gadget
      title: RCP - Release Progress
      description: Actual delivery progress per team vs planned scope and time-expected pace for a release.
      thumbnail: https://developer.atlassian.com/platform/forge/images/icons/issue-panel-icon.svg
      resource: main
      resolver:
        function: resolver
      edit:
        resource: main
    - key: release-velocity-gadget
      title: RCP - Velocity
      description: Committed vs actual velocity per team over recent closed sprints.
      thumbnail: https://developer.atlassian.com/platform/forge/images/icons/issue-panel-icon.svg
      resource: main
      resolver:
        function: resolver
      edit:
        resource: main
  webtrigger:
    - key: easybi-export
      function: easybiExport
  function:
    - key: resolver
      handler: index.handler
    - key: easybiExport
      handler: index.easybiExport

resources:
  - key: main
    path: static/capacity-waterline/build

permissions:
  scopes:
    - read:jira-work
    - read:jira-user
    - write:jira-work
    - read:issue:jira
    - read:project:jira
    - read:issue-type:jira
    - read:field:jira
    - write:issue:jira
    - read:board-scope:jira-software
    - read:sprint:jira-software
    - write:sprint:jira-software
    - delete:sprint:jira-software
    - read:issue-details:jira
    - read:jql:jira
    - manage:jira-project
    - storage:app

app:
  id: ari:cloud:ecosystem::app/283baa0a-a9b2-4a43-b17b-2e008d27dc92
  runtime:
    name: nodejs22.x
