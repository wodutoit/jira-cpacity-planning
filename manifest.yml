modules:
  jira:globalPage:
    - key: capacity-waterline
      resource: main
      resolver:
        function: resolver
      title: Capacity Waterline
  jira:appSettings:
    - key: capacity-waterline-settings
      resource: main
      resolver:
        function: resolver
      title: Capacity Waterline — Settings
  function:
    - key: resolver
      handler: src/index.handler

resources:
  - key: main
    path: static/capacity-waterline/build

permissions:
  scopes:
    # Jira core — read ideas (issues), projects, versions, fields, statuses
    - read:jira-work
    # Jira users — read account IDs for the editor access-control picker
    - read:jira-user
    # Jira write — create/update issues during Delivery → Convert phase
    - write:jira-work
    # Agile boards — read boards for team→space mapping
    - read:board-scope:jira-software
    # Sprints — read sprints per team board (Delivery mode)
    - read:sprint:jira-software
    # Sprints write — create/edit sprints in Delivery mode
    - write:sprint:jira-software
    # Teams API scope — TBC in Spike #2 (/rest/teams/1.0/teams/ accessibility)
    # Placeholder; may need read:team:jira or is covered by read:jira-user

app:
  # Replace with real ID after: forge register
  id: ari:cloud:ecosystem::app/REPLACE-AFTER-FORGE-REGISTER
  name: Capacity Waterline
  runtime:
    name: nodejs22.x
