modules:
  jira:globalPage:
    - key: capacity-waterline
      resource: main
      resolver:
        function: resolver
      title: Release Capacity Planning
      icon: resource:main;icons/icon.png
      pages:
        - title: Intake
          route: intake
        - title: Release Planning
          route: release-planning
        - title: Delivery Planning
          route: delivery-planning
  function:
    - key: resolver
      handler: index.handler

resources:
  - key: main
    path: static/capacity-waterline/build

permissions:
  scopes:
    - read:jira-work
    - read:jira-user
    - write:jira-work
    - read:issue:jira
    - read:project:jira
    - read:issue-type:jira
    - read:field:jira
    - write:issue:jira
    - read:board-scope:jira-software
    - read:sprint:jira-software
    - write:sprint:jira-software
    - delete:sprint:jira-software
    - read:issue-details:jira
    - read:jql:jira
    - manage:jira-project
    - storage:app

app:
  id: ari:cloud:ecosystem::app/283baa0a-a9b2-4a43-b17b-2e008d27dc92
  runtime:
    name: nodejs22.x
